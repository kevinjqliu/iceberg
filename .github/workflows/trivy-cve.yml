name: "Trivy CVE Scan"

on:
  push:
    branches:
    - 'main'
    paths:
    - '**/*.gradle'
    - '**/gradle.properties'
    - 'gradle/libs.versions.toml'
    - 'settings.gradle'
    - '**/pom.xml'
    - '**/requirements.txt'
    - '.github/workflows/trivy-cve.yml'
  pull_request:
    paths:
    - '**/*.gradle'
    - '**/gradle.properties'
    - 'gradle/libs.versions.toml'
    - 'settings.gradle'
    - '**/pom.xml'
    - '**/requirements.txt'
    - '.github/workflows/trivy-cve.yml'
  schedule:
    - cron: '27 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  trivy-cve-scan:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false

    - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        distribution: zulu
        java-version: 17

    - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5 # zizmor: ignore[cache-poisoning] -- cache writes are restricted to the default branch by setup-gradle

    - name: Generate Gradle lockfiles
      run: |
        lock_init_script="$RUNNER_TEMP/trivy-locks.init.gradle"
        cat > "$lock_init_script" <<'EOF'
        allprojects {
          dependencyLocking {
            lockAllConfigurations()
          }

          tasks.register('resolveAndLockAll') {
            notCompatibleWithConfigurationCache('Filters configurations at execution time')
            doFirst {
              assert gradle.startParameter.writeDependencyLocks : "$path must be run with --write-locks"
            }
            doLast {
              configurations.findAll {
                it.canBeResolved &&
                  (it.name.endsWith('Classpath') || it.name.endsWith('AnnotationProcessor')) &&
                  !it.name.startsWith('incrementalScalaAnalysis')
              }.each { it.resolve() }
            }
          }
        }
        EOF

        ./gradlew -I "$lock_init_script" -DallModules resolveAndLockAll --write-locks -Pquick=true --console=plain

    - name: Verify generated dependency inputs
      run: |
        lockfiles=$(find . \( -name 'gradle.lockfile' -o -name 'settings-gradle.lockfile' \) -print | LC_ALL=C sort)

        if [ -z "$lockfiles" ]; then
          echo "No Gradle lockfiles were generated for Trivy to scan" >&2
          exit 1
        fi

        printf 'Generated lockfiles for Trivy scan:\n%s\n' "$lockfiles"

    - name: Generate Trivy findings report
      uses: lhotari/sandboxed-trivy-action@555963036b2012b44c1071508a236e569db28ebb # v1
      with:
        scan-type: 'fs'
        scan-ref: '.'
        ignore-unfixed: 'true'
        format: 'json'
        output: 'trivy-results.json'
        severity: 'HIGH,CRITICAL'
        exit-code: '0'
        hide-progress: 'true'

    - name: Summarize Trivy findings
      run: |
        total_findings=$(jq '[.[].Vulnerabilities[]?] | length' trivy-results.json)
        unique_vulnerabilities=$(jq '[.[].Vulnerabilities[]? | .VulnerabilityID] | unique | length' trivy-results.json)
        affected_packages=$(jq '[.[].Vulnerabilities[]? | "\(.PkgName)@\(.InstalledVersion)" ] | unique | length' trivy-results.json)

        summary_file="$RUNNER_TEMP/trivy-overview.md"

        if [ "$total_findings" -eq 0 ]; then
          {
            echo '## Trivy overview'
            echo
            echo 'No HIGH/CRITICAL vulnerabilities found.'
          } > "$summary_file"
        else
          {
            echo '## Trivy overview'
            echo
            echo '| Metric | Count |'
            echo '| --- | ---: |'
            echo "| Findings | $total_findings |"
            echo "| Unique vulnerabilities | $unique_vulnerabilities |"
            echo "| Affected packages | $affected_packages |"
            echo
            echo '### Severity breakdown'
            echo
            echo '| Severity | Count |'
            echo '| --- | ---: |'
            jq -r '
              [.[].Vulnerabilities[]?]
              | group_by(.Severity)
              | map({severity: .[0].Severity, count: length})
              | sort_by([if .severity == "CRITICAL" then 0 elif .severity == "HIGH" then 1 elif .severity == "MEDIUM" then 2 elif .severity == "LOW" then 3 else 4 end, .severity])
              | .[]
              | "| \(.severity) | \(.count) |"
            ' trivy-results.json
            echo
            echo '### Affected packages'
            echo
            echo '| Severity | Package | Installed | Vulns | Vulnerability IDs | Fixed |'
            echo '| --- | --- | --- | ---: | --- | --- |'
            jq -r '
              [.[].Vulnerabilities[]?
                | {
                    severity: .Severity,
                    severity_rank: (if .Severity == "CRITICAL" then 0 elif .Severity == "HIGH" then 1 elif .Severity == "MEDIUM" then 2 elif .Severity == "LOW" then 3 else 4 end),
                    vulnerability: .VulnerabilityID,
                    package: .PkgName,
                    installed: .InstalledVersion,
                    fixed: (.FixedVersion // "-")
                  }]
              | group_by([.package, .installed])
              | map(
                  (map(.vulnerability) | unique | sort) as $ids
                  | {
                      severity_rank: (map(.severity_rank) | min),
                      highest_severity: (min_by(.severity_rank).severity),
                      package: .[0].package,
                      installed: .[0].installed,
                      vulnerability_count: ($ids | length),
                      vulnerabilities: (if ($ids | length) > 4 then (($ids[:4] | join(", ")) + ", ...") else ($ids | join(", ")) end),
                      fixed: ([.[].fixed | select(. != "-")] | unique | if length == 0 then "-" else join(", ") end)
                    }
                )
              | sort_by([.severity_rank, - .vulnerability_count, .package, .installed])
              | .[]
              | "| \(.highest_severity) | \(.package) | \(.installed) | \(.vulnerability_count) | \(.vulnerabilities) | \(.fixed) |"
            ' trivy-results.json
          } > "$summary_file"
        fi

        cat "$summary_file"
        cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"

