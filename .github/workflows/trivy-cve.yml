name: "Trivy CVE Scan"

on:
  push:
    branches:
    - 'main'
    paths:
    - '**/*.gradle'
    - '**/gradle.properties'
    - 'gradle/libs.versions.toml'
    - '**/pom.xml'
    - '**/requirements.txt'
    - '.github/workflows/trivy-cve.yml'
  pull_request:
    paths:
    - '**/*.gradle'
    - '**/gradle.properties'
    - 'gradle/libs.versions.toml'
    - '**/pom.xml'
    - '**/requirements.txt'
    - '.github/workflows/trivy-cve.yml'
  schedule:
    - cron: '27 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  trivy-cve-scan:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false

    - name: Run Trivy CVE scan
      uses: lhotari/sandboxed-trivy-action@555963036b2012b44c1071508a236e569db28ebb # v1
      with:
        scan-type: 'fs'
        scan-ref: '.'
        scanners: 'vuln'
        severity: 'HIGH,CRITICAL'
        exit-code: '1'
        hide-progress: 'true'