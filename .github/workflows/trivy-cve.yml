name: "Trivy CVE Scan"

on:
  push:
    branches:
    - 'main'
    paths:
    - '**/*.gradle'
    - '**/gradle.properties'
    - 'gradle/libs.versions.toml'
    - 'settings.gradle'
    - '**/pom.xml'
    - '**/requirements.txt'
    - '.github/workflows/trivy-cve.yml'
  pull_request:
    paths:
    - '**/*.gradle'
    - '**/gradle.properties'
    - 'gradle/libs.versions.toml'
    - 'settings.gradle'
    - '**/pom.xml'
    - '**/requirements.txt'
    - '.github/workflows/trivy-cve.yml'
  schedule:
    - cron: '27 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  trivy-cve-scan:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false

    - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        distribution: zulu
        java-version: 17

    - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5 # zizmor: ignore[cache-poisoning] -- cache writes are restricted to the default branch by setup-gradle

    - name: Generate Gradle lockfiles
      run: |
        lock_init_script="$RUNNER_TEMP/trivy-locks.init.gradle"
        cat > "$lock_init_script" <<'EOF'
        allprojects {
          dependencyLocking {
            lockAllConfigurations()
          }

          tasks.register('resolveAndLockAll') {
            notCompatibleWithConfigurationCache('Filters configurations at execution time')
            doFirst {
              assert gradle.startParameter.writeDependencyLocks : "$path must be run with --write-locks"
            }
            doLast {
              configurations.findAll {
                it.canBeResolved &&
                  (it.name.endsWith('Classpath') || it.name.endsWith('AnnotationProcessor')) &&
                  !it.name.startsWith('incrementalScalaAnalysis')
              }.each { it.resolve() }
            }
          }
        }
        EOF

        ./gradlew -I "$lock_init_script" -DallModules resolveAndLockAll --write-locks -Pquick=true --console=plain

    - name: Verify generated dependency inputs
      run: |
        lockfiles=$(find . \( -name 'gradle.lockfile' -o -name 'settings-gradle.lockfile' \) -print | LC_ALL=C sort)

        if [ -z "$lockfiles" ]; then
          echo "No Gradle lockfiles were generated for Trivy to scan" >&2
          exit 1
        fi

        printf 'Generated lockfiles for Trivy scan:\n%s\n' "$lockfiles"

    - name: Run Trivy repo scan with generated lockfiles
      uses: lhotari/sandboxed-trivy-action@555963036b2012b44c1071508a236e569db28ebb # v1
      with:
        scan-type: 'fs'
        scan-ref: '.'
        ignore-unfixed: 'true'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL'
        limit-severities-for-sarif: 'true'
        exit-code: '1'
        hide-progress: 'true'

    - name: Upload Trivy repo scan results
      if: always()
      uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
      with:
        sarif_file: 'trivy-results.sarif'
